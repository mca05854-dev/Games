<html lang="en" style="overflow: hidden;">
<head>
    <style type="text/css">
        :root {
            --toastify-color-light: #fff;
            --toastify-color-dark: #121212;
            --toastify-color-info: #3498db;
            --toastify-color-success: #07bc0c;
            --toastify-color-warning: #f1c40f;
            --toastify-color-error: hsl(6, 78%, 57%);
            --toastify-color-transparent: rgba(255, 255, 255, .7);

            --toastify-icon-color-info: var(--toastify-color-info);
            --toastify-icon-color-success: var(--toastify-color-success);
            --toastify-icon-color-warning: var(--toastify-color-warning);
            --toastify-icon-color-error: var(--toastify-color-error);

            --toastify-container-width: fit-content;
            --toastify-toast-width: 320px;
            --toastify-toast-offset: 16px;

            --toastify-toast-top:
                max(var(--toastify-toast-offset), env(safe-area-inset-top));

            --toastify-toast-right:
                max(var(--toastify-toast-offset), env(safe-area-inset-right));

            --toastify-toast-left:
                max(var(--toastify-toast-offset), env(safe-area-inset-left));

            --toastify-toast-bottom:
                max(var(--toastify-toast-offset), env(safe-area-inset-bottom));

            --toastify-toast-background: #fff;
            --toastify-toast-padding: 14px;
            --toastify-toast-min-height: 64px;
            --toastify-toast-max-height: 800px;
            --toastify-toast-bd-radius: 6px;

            --toastify-toast-shadow:
                0px 4px 12px rgba(0, 0, 0, .1);

            --toastify-font-family: sans-serif;
            --toastify-z-index: 9999;

            --toastify-text-color-light: #757575;
            --toastify-text-color-dark: #fff;
            --toastify-text-color-info: #fff;
            --toastify-text-color-success: #fff;
            --toastify-text-color-warning: #fff;
            --toastify-text-color-error: #fff;

            --toastify-spinner-color: #616161;
            --toastify-spinner-color-empty-area: #e0e0e0;

            --toastify-color-progress-light:
                linear-gradient(
                    to right,
                    #4cd964,
                    #5ac8fa,
                    #007aff,
                    #34aadc,
                    #5856d6,
                    #ff2d55
                );

            --toastify-color-progress-dark: #bb86fc;
            --toastify-color-progress-info: var(--toastify-color-info);
            --toastify-color-progress-success: var(--toastify-color-success);
            --toastify-color-progress-warning: var(--toastify-color-warning);
            --toastify-color-progress-error: var(--toastify-color-error);

            --toastify-color-progress-bgo: .2;
        }

        .Toastify__toast-container {
            z-index: var(--toastify-z-index);
            -webkit-transform: translate3d(0, 0, var(--toastify-z-index));
            position: fixed;
            width: var(--toastify-container-width);
            box-sizing: border-box;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .Toastify__toast-container--top-left {
            top: var(--toastify-toast-top);
            left: var(--toastify-toast-left);
        }

        .Toastify__toast-container--top-center {
            top: var(--toastify-toast-top);
            left: 50%;
            transform: translate(-50%);
            align-items: center;
        }

        .Toastify__toast-container--top-right {
            top: var(--toastify-toast-top);
            right: var(--toastify-toast-right);
            align-items: end;
        }

        .Toastify__toast {
            --y: 0;

            position: relative;
            touch-action: none;
            width: var(--toastify-toast-width);
            min-height: var(--toastify-toast-min-height);

            box-sizing: border-box;
            margin-bottom: 1rem;
            padding: var(--toastify-toast-padding);

            border-radius: var(--toastify-toast-bd-radius);
            box-shadow: var(--toastify-toast-shadow);

            max-height: var(--toastify-toast-max-height);

            font-family: var(--toastify-font-family);
            z-index: 0;

            display: flex;
            flex: 1 auto;
            align-items: center;
            word-break: break-word;
        }

        .Toastify__toast-theme--dark {
            background: var(--toastify-color-dark);
            color: var(--toastify-text-color-dark);
        }

        .Toastify__toast-theme--light,
        .Toastify__toast-theme--colored.Toastify__toast--default {
            background: var(--toastify-color-light);
            color: var(--toastify-text-color-light);
        }

        .Toastify__toast-theme--colored.Toastify__toast--info {
            color: var(--toastify-text-color-info);
            background: var(--toastify-color-info);
        }

        .Toastify__toast-theme--colored.Toastify__toast--success {
            color: var(--toastify-text-color-success);
            background: var(--toastify-color-success);
        }

        .Toastify__toast-theme--colored.Toastify__toast--warning {
            color: var(--toastify-text-color-warning);
            background: var(--toastify-color-warning);
        }

        .Toastify__toast-theme--colored.Toastify__toast--error {
            color: var(--toastify-text-color-error);
            background: var(--toastify-color-error);
        }

        .Toastify__close-button {
            color: #fff;
            position: absolute;
            top: 6px;
            right: 6px;

            background: transparent;
            outline: none;
            border: none;
            padding: 0;

            cursor: pointer;
            opacity: .7;
            transition: .3s ease;
            z-index: 1;
        }

        .Toastify__close-button:hover,
        .Toastify__close-button:focus {
            opacity: 1;
        }

        .Toastify__spinner {
            width: 20px;
            height: 20px;
            box-sizing: border-box;

            border: 2px solid;
            border-radius: 100%;

            border-color: var(--toastify-spinner-color-empty-area);
            border-right-color: var(--toastify-spinner-color);

            animation: Toastify__spin .65s linear infinite;
        }

        @keyframes Toastify__spin {
            0% {
                transform: rotate(0);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media only screen and (max-width: 480px) {
            .Toastify__toast-container {
                width: 100vw;
                left: env(safe-area-inset-left);
                margin: 0;
            }

            .Toastify__toast {
                --toastify-toast-width: 100%;
                margin-bottom: 0;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

</body>
</html>
