<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Embedded Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

</head>

<body>
  <iframe src="game.html" allowfullscreen></iframe>
</body>
</html>
