<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body { background: #70c5ce; }
        #gameCanvas { background: #fff; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.4, jump: -8, velocity: 0 };
        let isGameOver = false;

        function drawBird() {
            ctx.fillStyle = '#ff0';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
        }

        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            if (bird.y + bird.height > canvas.height) isGameOver = true;
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBird();
        }

        function gameLoop() {
            if (!isGameOver) {
                updateBird();
                draw();
                requestAnimationFrame(gameLoop);
            } else {
                alert('Game Over!');
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { bird.velocity = bird.jump; }
        });

        gameLoop();
    </script>
</body>
</html>
