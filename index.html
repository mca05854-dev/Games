<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

#top {
    padding: 15px;
    background: #222;
    display: flex;
    gap: 10px;
    align-items: center;
}

button {
    padding: 10px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #666;
}

#games {
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.game-btn {
    padding: 10px 15px;
    background: #2a7fff;
    border-radius: 6px;
    cursor: pointer;
}

iframe {
    width: 100%;
    height: 85vh;
    border: none;
}
</style>
</head>
<body>

<div id="top">
    <h3>🎮 Game Hub</h3>
    <input id="name" placeholder="Game name">
    <input id="file" placeholder="file.html (must be in repo)">
    <button onclick="addGame()">Add Game</button>
    <button onclick="closeGame()">Close Game</button>
</div>

<div id="games"></div>

<iframe id="screen" style="display:none;"></iframe>

<script>
const games = [];

function addGame(){
    const name = document.getElementById("name").value;
    const file = document.getElementById("file").value;

    if(!name || !file) return;

    games.push({name, file});
    render();
}

function render(){
    const container = document.getElementById("games");
    container.innerHTML = "";

    games.forEach(g=>{
        const btn = document.createElement("div");
        btn.className = "game-btn";
        btn.innerText = g.name;

        btn.onclick = () => {
            document.getElementById("screen").style.display = "block";
            document.getElementById("screen").src = g.file;
        };

        container.appendChild(btn);
    });
}

function closeGame(){
    document.getElementById("screen").style.display = "none";
    document.getElementById("screen").src = "";
}
</script>

</body>
</html>
