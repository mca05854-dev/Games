<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Game Hub</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

#top {
    padding: 12px;
    background: #222;
    display: flex;
    align-items: center;
    gap: 10px;
}

#games {
    padding: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.game {
    padding: 10px 15px;
    background: #2a7fff;
    border-radius: 8px;
    cursor: pointer;
}

.game:hover {
    background: #4a90ff;
}

iframe {
    width: 100%;
    height: 85vh;
    border: none;
    display: none;
}

#status {
    margin-left: auto;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>
<body>

<div id="top">
    🎮 Auto Game Hub
    <div id="status">Scanning repo...</div>
</div>

<div id="games"></div>

<iframe id="frame"></iframe>

<script>
let owner, repo;

// 🔥 Detect GitHub Pages repo automatically
(function detectRepo(){
    const parts = window.location.hostname.split(".");
    owner = parts[0]; // username.github.io

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    repo = pathParts[0] || owner + ".github.io";

    if(repo === owner + ".github.io"){
        repo = owner + ".github.io";
    }

    scanRepo();
})();

async function scanRepo(){
    const status = document.getElementById("status");

    try {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/`;

        const res = await fetch(url);
        const data = await res.json();

        if(!Array.isArray(data)){
            status.innerText = "❌ Cannot scan repo (private or error)";
            return;
        }

        const games = data.filter(file =>
            file.name.endsWith(".html") &&
            file.name !== "index.html"
        );

        if(games.length === 0){
            status.innerText = "No HTML games found";
            return;
        }

        status.innerText = `Found ${games.length} games`;

        renderGames(games);

    } catch (err) {
        status.innerText = "Error scanning repo";
        console.error(err);
    }
}

function renderGames(files){
    const container = document.getElementById("games");
    const frame = document.getElementById("frame");

    container.innerHTML = "";

    files.forEach(file => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerText = file.name;

        div.onclick = () => {
            frame.style.display = "block";
            frame.src = file.path;
        };

        container.appendChild(div);
    });
}
</script>

</body>
</html>
