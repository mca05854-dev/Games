<script>
const user = "mca05854-dev";
const repo = "Games";
const apiURL = `https://api.github.com/repos/${user}/${repo}/contents`;

let games = {};

// Recursively scan repo
async function scan(path = "") {
  const res = await fetch(apiURL + path);
  const data = await res.json();

  for (let item of data) {
    if (item.type === "dir") {
      await scan("/" + item.path);
    }

    if (item.type === "file") {
      const parts = item.path.split("/");

      const fileName = parts.pop();
      const folder = parts.join("/");

      // Only care about index.html files
      if (fileName === "index.html") {
        games[folder] = item.path;
      }
    }
  }

  render();
}

// Render game buttons
function render(filter = "") {
  const container = document.getElementById("games");
  container.innerHTML = "";

  Object.entries(games).forEach(([name, path]) => {
    if (!name.toLowerCase().includes(filter.toLowerCase())) return;

    const wrapper = document.createElement("div");
    wrapper.className = "btn";

    const title = document.createElement("div");
    title.textContent = name || "Root Game";

    const btn = document.createElement("a");
    btn.textContent = "▶ Play";
    btn.href = path;
    btn.style.display = "block";
    btn.style.marginTop = "8px";
    btn.style.color = "lime";

    wrapper.appendChild(title);
    wrapper.appendChild(btn);
    container.appendChild(wrapper);
  });
}

// Search
document.getElementById("search").addEventListener("input", (e) => {
  render(e.target.value);
});

scan();
</script>
