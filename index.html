<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

#top {
    padding: 12px;
    background: #222;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

#fullscreenHint {
    background: #333;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 14px;
    opacity: 0.9;
}

#games {
    padding: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.game {
    padding: 10px 15px;
    background: #2a7fff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.game:hover {
    background: #4a90ff;
    transform: scale(1.05);
}

iframe {
    width: 100%;
    height: 85vh;
    border: none;
    display: none;
    background: black;
}

#status {
    margin-left: auto;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div id="top">
    🎮 Auto Game Hub

    <div id="fullscreenHint">
        Press F for Fullscreen / Exit Fullscreen
    </div>

    <div id="status">Scanning repo...</div>
</div>

<div id="games"></div>

<iframe id="frame"></iframe>

<script>
let owner, repo;

// Detect GitHub Pages repo automatically
(function detectRepo(){
    const parts = window.location.hostname.split(".");
    owner = parts[0];

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    repo = pathParts[0] || owner + ".github.io";

    if(repo === owner + ".github.io"){
        repo = owner + ".github.io";
    }

    scanRepo();
})();

async function scanRepo(){
    const status = document.getElementById("status");

    try {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/`;

        const res = await fetch(url);
        const data = await res.json();

        if(!Array.isArray(data)){
            status.innerText = "❌ Cannot scan repo";
            return;
        }

        // Detect BOTH .html and .js files
        const games = data.filter(file =>
            (
                file.name.endsWith(".html") ||
                file.name.endsWith(".js")
            ) &&
            file.name !== "index.html"
        );

        if(games.length === 0){
            status.innerText = "No games found";
            return;
        }

        status.innerText = `Found ${games.length} files`;

        renderGames(games);

    } catch (err) {
        status.innerText = "Error scanning repo";
        console.error(err);
    }
}

function renderGames(files){
    const container = document.getElementById("games");
    const frame = document.getElementById("frame");

    container.innerHTML = "";

    files.forEach(file => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerText = file.name;

        div.onclick = () => {

            // If HTML file → open directly
            if(file.name.endsWith(".html")){
                frame.src = file.path;
            }

            // If JS file → create temporary HTML wrapper
            if(file.name.endsWith(".js")){
                const wrapper = `
<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">
<script src="${file.path}"><\/script>
</body>
</html>
                `;

                const blob = new Blob([wrapper], {type:"text/html"});
                frame.src = URL.createObjectURL(blob);
            }

            frame.style.display = "block";
        };

        container.appendChild(div);
    });
}

// Fullscreen toggle with F key
document.addEventListener("keydown", (e) => {

    if(e.key.toLowerCase() === "f"){

        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }

    }

});
</script>

</body>
</html>
